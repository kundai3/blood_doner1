<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Donor - BloodLink</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">🩸 BloodLink</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="donors.html">Find Donors</a></li>
        <li><a href="requests.html">Requests</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<div class="form-container">

    <h1>Become a Blood Donor</h1>

    <form id="registerForm">

        <input
            type="text"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            placeholder="Email Address"
            required
        >

        <input
            type="tel"
            placeholder="Phone Number"
            required
        >

        <select required>
            <option value="">Select Blood Group</option>
            <option>O+</option>
            <option>O-</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>

        <input
            type="text"
            placeholder="City"
            required
        >

        <input
            type="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

</div>

<script src="js/register.js"></script>

</body>
</html>
